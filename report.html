<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用報告 — 流量 & 訂單分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600;8..144,700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary: #3949AB; --md-on-primary: #FFFFFF;
            --md-primary-container: #E8EAF6; --md-on-primary-container: #1A237E;
            --md-surface: #FFFFFF; --md-surface-variant: #F4F4F9;
            --md-surface-container: #EEEDF4;
            --md-on-surface: #1C1B1F; --md-on-surface-variant: #46464F;
            --md-outline: #C5C6D0; --md-outline-variant: #E2E2EC;
            --md-error: #B3261E; --md-error-container: #F9DEDC;
            --md-tertiary: #00796B;
            --elev1: 0 1px 2px rgba(57,73,171,0.06), 0 2px 6px rgba(57,73,171,0.05);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto Flex', sans-serif; background: var(--md-surface-variant); color: var(--md-on-surface); min-height: 100vh; -webkit-font-smoothing: antialiased; }

        /* Top bar */
        .top-bar { background: var(--md-surface); border-bottom: 1px solid var(--md-outline-variant); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--elev1); }
        .app-icon { width: 40px; height: 40px; background: var(--md-primary-container); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .page-title { font-size: 1.05rem; font-weight: 600; color: var(--md-on-surface); letter-spacing: -0.01em; }
        .page-sub { font-size: 0.7rem; color: var(--md-on-surface-variant); margin-top: 1px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; font-weight: 500; color: var(--md-on-surface-variant); text-decoration: none; padding: 7px 14px; border-radius: 100px; border: 1px solid var(--md-outline); transition: all 0.15s; }
        .back-link:hover { background: var(--md-surface-variant); }

        /* Body */
        .page-body { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

        /* Summary cards */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--md-surface); border-radius: 12px; box-shadow: var(--elev1); padding: 20px 24px; }
        .stat-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--md-on-surface-variant); margin-bottom: 8px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--md-on-surface); font-family: 'Roboto Flex', sans-serif; letter-spacing: -0.02em; line-height: 1; }
        .stat-sub { font-size: 0.72rem; color: var(--md-on-surface-variant); margin-top: 6px; }

        /* Tables */
        .section-title { font-size: 0.8rem; font-weight: 600; color: var(--md-on-surface); letter-spacing: 0.02em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .md-card { background: var(--md-surface); border-radius: 12px; box-shadow: var(--elev1); overflow: hidden; margin-bottom: 28px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        thead th { background: var(--md-surface-container); color: var(--md-on-surface-variant); font-weight: 600; font-size: 0.68rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--md-outline-variant); }
        tbody td { padding: 11px 16px; border-bottom: 1px solid var(--md-outline-variant); color: var(--md-on-surface); vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--md-surface-variant); }
        .mono { font-family: 'Roboto Mono', monospace; font-size: 0.78rem; color: var(--md-on-surface-variant); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 0.68rem; font-weight: 600; }
        .badge-login { background: var(--md-primary-container); color: var(--md-on-primary-container); }
        .badge-brand { background: #E0F2F1; color: #00695C; }
        .brand-pill { display: inline-block; padding: 2px 8px; border-radius: 100px; background: var(--md-surface-variant); border: 1px solid var(--md-outline-variant); font-size: 0.68rem; margin: 1px 2px; color: var(--md-on-surface-variant); }

        /* Loading / error states */
        .state-box { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--md-on-surface-variant); font-size: 0.85rem; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--md-outline); border-top-color: var(--md-primary); border-radius: 50%; animation: spin 0.75s linear infinite; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { background: var(--md-error-container); color: var(--md-error); padding: 16px 20px; border-radius: 12px; font-size: 0.82rem; font-weight: 500; margin-bottom: 20px; display: none; }

        @media (max-width: 768px) {
            .summary-grid { grid-template-columns: 1fr 1fr; }
            .top-bar, .page-body { padding-left: 16px; padding-right: 16px; }
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div style="display:flex;align-items:center;gap:14px;">
        <div class="app-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3949AB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="8" width="6" height="13" rx="1"/><rect x="16" y="13" width="6" height="8" rx="1"/></svg>
        </div>
        <div>
            <div class="page-title">使用報告</div>
            <div class="page-sub">Usage Report · Admin Only</div>
        </div>
    </div>
    <a class="back-link" href="/">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        返回儀表板
    </a>
</header>

<div class="page-body">
    <div class="error-box" id="errorBox"></div>

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid">
        <div class="stat-card"><div class="state-box"><div class="spinner"></div></div></div>
        <div class="stat-card"><div class="state-box"><div class="spinner"></div></div></div>
        <div class="stat-card"><div class="state-box"><div class="spinner"></div></div></div>
        <div class="stat-card"><div class="state-box"><div class="spinner"></div></div></div>
    </div>

    <!-- Per-user table -->
    <p class="section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3949AB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        使用者摘要
    </p>
    <div class="md-card" id="userTableWrap">
        <div class="state-box"><div class="spinner"></div> 載入中...</div>
    </div>

    <!-- Recent activity -->
    <p class="section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3949AB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        最近活動 <span style="font-weight:400;color:var(--md-on-surface-variant);font-size:0.72rem;">(最新 50 筆)</span>
    </p>
    <div class="md-card" id="recentTableWrap">
        <div class="state-box"><div class="spinner"></div> 載入中...</div>
    </div>
</div>

<script>
async function loadReport() {
    try {
        const res  = await fetch('/api/report');
        if (res.status === 403) {
            document.getElementById('errorBox').textContent = '⚠ 您沒有權限查看此報告。';
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('summaryGrid').innerHTML = '';
            document.getElementById('userTableWrap').innerHTML = '';
            document.getElementById('recentTableWrap').innerHTML = '';
            return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderSummary(data.summary);
        renderUserTable(data.users);
        renderRecentTable(data.recent);
    } catch (err) {
        document.getElementById('errorBox').textContent = '⚠ 載入失敗：' + err.message;
        document.getElementById('errorBox').style.display = 'block';
    }
}

function renderSummary(s) {
    document.getElementById('summaryGrid').innerHTML = `
        <div class="stat-card">
            <div class="stat-label">不重複使用者</div>
            <div class="stat-value">${s.uniqueUsers}</div>
            <div class="stat-sub">已登入帳號數</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">總登入次數</div>
            <div class="stat-value">${s.totalLogins}</div>
            <div class="stat-sub">所有使用者合計</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">品牌瀏覽次數</div>
            <div class="stat-value">${s.totalBrandViews}</div>
            <div class="stat-sub">切換品牌合計</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">最熱門品牌</div>
            <div class="stat-value" style="font-size:1.1rem;padding-top:6px;">${s.topBrand}</div>
            <div class="stat-sub">瀏覽次數最多</div>
        </div>`;
}

function renderUserTable(users) {
    if (!users.length) {
        document.getElementById('userTableWrap').innerHTML = '<div class="state-box">尚無使用者資料</div>';
        return;
    }
    const rows = users.map(u => `
        <tr>
            <td>${u.name || '—'}</td>
            <td class="mono">${u.email}</td>
            <td class="mono">${u.lastSeen.replace('T',' ').slice(0,16)}</td>
            <td style="text-align:center;">${u.logins}</td>
            <td style="text-align:center;">${u.brandViews}</td>
            <td>${u.brands.map(b => `<span class="brand-pill">${b}</span>`).join('')}</td>
        </tr>`).join('');
    document.getElementById('userTableWrap').innerHTML = `
        <table>
            <thead><tr>
                <th>姓名</th><th>Email</th><th>最後上線</th>
                <th style="text-align:center;">登入次數</th>
                <th style="text-align:center;">品牌瀏覽</th>
                <th>查看的品牌</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function renderRecentTable(events) {
    if (!events.length) {
        document.getElementById('recentTableWrap').innerHTML = '<div class="state-box">尚無活動記錄</div>';
        return;
    }
    const rows = events.map(e => `
        <tr>
            <td class="mono">${e.timestamp.slice(0,16)}</td>
            <td class="mono">${e.email}</td>
            <td><span class="badge ${e.event === 'login' ? 'badge-login' : 'badge-brand'}">${e.event === 'login' ? '登入' : '瀏覽品牌'}</span></td>
            <td>${e.brand || '—'}</td>
        </tr>`).join('');
    document.getElementById('recentTableWrap').innerHTML = `
        <table>
            <thead><tr><th>時間</th><th>Email</th><th>事件</th><th>品牌</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
}

loadReport();
</script>
</body>
</html>
