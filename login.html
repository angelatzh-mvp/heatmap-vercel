<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 — 流量 & 訂單分析</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%227%22%20fill%3D%22%23FFFFFF%22%2F%3E%3Crect%20x%3D%224%22%20y%3D%224%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23FFF9C4%22%2F%3E%3Crect%20x%3D%2210.5%22%20y%3D%224%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23FFCA28%22%2F%3E%3Crect%20x%3D%2217%22%20y%3D%224%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23FFA726%22%2F%3E%3Crect%20x%3D%2223.5%22%20y%3D%224%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23EF5350%22%2F%3E%3Crect%20x%3D%224%22%20y%3D%2210.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23FFCA28%22%2F%3E%3Crect%20x%3D%2210.5%22%20y%3D%2210.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23FFA726%22%2F%3E%3Crect%20x%3D%2217%22%20y%3D%2210.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23EF5350%22%2F%3E%3Crect%20x%3D%2223.5%22%20y%3D%2210.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23C62828%22%2F%3E%3Crect%20x%3D%224%22%20y%3D%2217%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23FFA726%22%2F%3E%3Crect%20x%3D%2210.5%22%20y%3D%2217%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23EF5350%22%2F%3E%3Crect%20x%3D%2217%22%20y%3D%2217%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23C62828%22%2F%3E%3Crect%20x%3D%2223.5%22%20y%3D%2217%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%237F0000%22%2F%3E%3Crect%20x%3D%224%22%20y%3D%2223.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23EF5350%22%2F%3E%3Crect%20x%3D%2210.5%22%20y%3D%2223.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%23C62828%22%2F%3E%3Crect%20x%3D%2217%22%20y%3D%2223.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%237F0000%22%2F%3E%3Crect%20x%3D%2223.5%22%20y%3D%2223.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221%22%20fill%3D%22%234A0000%22%2F%3E%3C%2Fsvg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600;8..144,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary:              #3949AB;
            --md-on-primary:           #FFFFFF;
            --md-primary-container:    #E8EAF6;
            --md-on-primary-container: #1A237E;
            --md-surface:              #FFFFFF;
            --md-surface-variant:      #F4F4F9;
            --md-on-surface:           #1C1B1F;
            --md-on-surface-variant:   #46464F;
            --md-outline:              #C5C6D0;
            --md-outline-variant:      #E2E2EC;
            --md-error:                #B3261E;
            --md-error-container:      #F9DEDC;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto Flex', sans-serif;
            background: var(--md-surface-variant);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--md-surface);
            border-radius: 28px;
            box-shadow: 0 2px 6px rgba(57,73,171,0.06), 0 8px 24px rgba(57,73,171,0.08);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .app-icon-wrap {
            width: 64px; height: 64px;
            background: var(--md-primary-container);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
        }

        .app-icon-wrap svg {
            width: 30px; height: 30px;
            stroke: var(--md-primary);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .headline {
            font-size: 1.5rem; font-weight: 600;
            color: var(--md-on-surface);
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 8px;
        }

        .subhead {
            font-size: 0.85rem; font-weight: 400;
            color: var(--md-on-surface-variant);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 36px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: var(--md-outline-variant);
            margin-bottom: 28px;
        }

        /* Google sign-in button — MD3 Outlined style */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px 24px;
            background: var(--md-surface);
            border: 1px solid var(--md-outline);
            border-radius: 100px;
            font-family: 'Roboto Flex', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--md-on-surface);
            letter-spacing: 0.02em;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .google-btn:hover {
            background: var(--md-surface-variant);
            box-shadow: 0 1px 3px rgba(57,73,171,0.12);
        }
        .google-btn:active { background: var(--md-primary-container); }

        /* Google "G" logo */
        .google-logo {
            width: 20px; height: 20px; flex-shrink: 0;
        }

        .access-note {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: var(--md-on-surface-variant);
            text-align: center;
        }
        .access-note svg {
            width: 13px; height: 13px;
            stroke: var(--md-on-surface-variant);
            fill: none; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
            flex-shrink: 0;
        }

        .error-banner {
            display: none;
            width: 100%;
            padding: 10px 16px;
            background: var(--md-error-container);
            color: var(--md-error);
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 20px;
        }
        .error-banner.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">

        <!-- App icon -->
        <div class="app-icon-wrap">
            <svg viewBox="0 0 24 24">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        </div>

        <h1 class="headline">流量 &amp; 訂單分析</h1>
        <p class="subhead">E-commerce Analytics Dashboard<br>請使用公司帳號登入以繼續</p>

        <div class="divider"></div>

        <!-- Error banner -->
        <div class="error-banner" id="errorBanner"></div>

        <!-- Google OAuth button -->
        <a class="google-btn" href="/api/auth/login">
            <!-- Official Google "G" SVG -->
            <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            使用 Google 帳號登入
        </a>

        <!-- Access restriction note -->
        <p class="access-note">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            僅限 @shopline.com 帳號存取
        </p>

    </div>

    <script>
        // Show error message if redirected with ?error=
        const params = new URLSearchParams(window.location.search);
        const err = params.get('error');
        const banner = document.getElementById('errorBanner');
        const messages = {
            access_denied:   '登入已取消，請重新嘗試。',
            token_failed:    '驗證失敗，請稍後再試。',
            userinfo_failed: '無法取得帳號資訊，請稍後再試。',
        };
        if (err && messages[err]) {
            banner.textContent = messages[err];
            banner.classList.add('show');
        }
    </script>
</body>
</html>
